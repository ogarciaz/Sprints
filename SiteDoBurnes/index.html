<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Aprendendo Tabelas</h1>
        <table>
            <thead>
                <tr>
                    <td width="55%">
                        Nome do Produto
                    </td>
                    <td width="15%">
                        Unidade
                    </td>
                    <td width="15%">
                        Valor
                    </td>
                    <td width="15%">
                        Total
                    </td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        Bolovo
                    </td>
                    <td>
                        10
                    </td>
                    <td>
                        R$ 10,00
                    </td>
                    <td>
                        R$ 100,00
                    </td>
                </tr>
                <tr>
                    <td>
                        Baré Cola
                    </td>
                    <td>
                        2
                    </td>
                    <td>
                        R$ 5,00
                    </td>
                    <td>
                        R$ 10,00
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3">TOTAL:</td>
                    <td>R$ 110,00</td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
</html>
